server {
    listen 80;
    root /var/www/html/public;
    index index.php;

    # Handle preflight quickly at nginx (adds required CORS headers)
    location / {
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' "$http_origin" always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Authorization,Content-Type,Accept,X-Requested-With' always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            add_header 'Vary' 'Origin' always;
            return 204;
        }

        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP / Laravel handling
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_pass backend:9000;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;

        # forward Origin to PHP so Laravel CORS middleware can inspect it
        fastcgi_param HTTP_ORIGIN $http_origin;

        # ensure responses include Vary and (as fallback) an origin header
        add_header 'Vary' 'Origin' always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;
    }
}
