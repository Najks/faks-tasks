services:
  db:
    image: postgres:16-alpine
    container_name: faks-db
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_DATABASE}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - backend_network

  backend:
    build: ./backend
    container_name: faks-backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_KEY: ${APP_KEY}
      APP_URL: ${APP_URL}
      APP_DEBUG: "false"
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
    command: sh -c "php artisan migrate --force && php artisan db:seed --force && php-fpm"
    restart: unless-stopped
    networks:
      - backend_network
      - nginx_network

  nginx:
    image: nginx:alpine
    container_name: faks-api
    expose:
      - "80"
    volumes:
      - ./backend:/var/www/html
      - ./backend/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - nginx_network
      - npm_network

  frontend:
    build: ./frontend
    container_name: faks-frontend
    expose:
      - "80"
    restart: unless-stopped
    networks:
      - npm_network

networks:
  backend_network:
    driver: bridge

  nginx_network:
    driver: bridge

  npm_network:
    external: true
    name: faks-tasks_default

volumes:
  db_data: